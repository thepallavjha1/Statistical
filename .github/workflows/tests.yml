name: CI/CD Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock
    
    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ tests/ --exit-zero
      continue-on-error: true
    
    - name: Format check with black
      run: |
        pip install black
        black --check src/ tests/ --exit-zero
      continue-on-error: true
    
    - name: Type check with mypy
      run: |
        pip install mypy
        mypy src/ --ignore-missing-imports --exit-zero
      continue-on-error: true
    
    - name: Run unit tests
      run: |
        pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=term
    
    - name: Run integration tests
      run: |
        pytest tests/integration/ -v
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true
    
    - name: Build validation
      run: |
        python -c "import pathlib, py_compile; [py_compile.compile(str(p)) for p in pathlib.Path('src').rglob('*.py')]"
        python -c "import src; print('Build validation passed')"

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Bandit security check
      uses: gaurav-nelson/github-action-bandit@v1
      with:
        path: "src"
      continue-on-error: true
    
    - name: Dependency check
      run: |
        pip install safety
        safety check --json
      continue-on-error: true
