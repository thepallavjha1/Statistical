version: '3.8'

services:
  statarb-app:
    build: .
    container_name: statarb-platform
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL for production database
  postgres:
    image: postgres:14-alpine
    container_name: statarb-db
    environment:
      POSTGRES_DB: statarb
      POSTGRES_USER: ${DB_USER:-statarb_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    # Uncomment to expose to host (not recommended for production)
    # ports:
    #   - "5432:5432"

volumes:
  postgres_data:

networks:
  default:
    name: statarb-network
